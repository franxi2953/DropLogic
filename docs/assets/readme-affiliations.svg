<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 270" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">DropLogic research affiliations</title>
  <desc id="desc">University of Cambridge centered between the Occhipinti Group and Di Michele Lab, with UKRI, EPSRC, and Sensor CDT support below.</desc>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --panel: #ffffff;
      --fg: #111111;
      --muted: #5d5d5d;
      --soft: #f4f4f4;
      --hair: #111111;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --fg: #f0f6fc;
        --muted: #b7c0ca;
        --soft: #21262d;
        --hair: #f0f6fc;
      }
    }
    .bg { fill: var(--bg); }
    .panel { fill: var(--panel); stroke: var(--hair); }
    .soft { fill: var(--soft); stroke: var(--hair); }
    .fg { fill: var(--fg); }
    .muted { fill: var(--muted); }
    .line { stroke: var(--hair); }
    .title {
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .label {
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.8px;
    }
    .body {
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-size: 15px;
      letter-spacing: .5px;
    }
    .small {
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
    }
  </style>

  <rect class="bg" x="1" y="1" width="978" height="268" stroke="var(--hair)" stroke-width="2"/>

  <text class="label muted" x="490" y="34" text-anchor="middle">PHD RESEARCH PROJECT</text>
  <line class="line" x1="56" y1="54" x2="924" y2="54" stroke-width="1"/>

  <g transform="translate(64 82)">
    <rect class="panel" x="0" y="0" width="268" height="96" stroke-width="1.5"/>
    <circle class="soft" cx="44" cy="48" r="27" stroke-width="1.5"/>
    <path class="line" d="M27 50 C35 30, 56 30, 65 50" stroke-width="2" stroke-linecap="square"/>
    <path class="line" d="M29 57 C40 68, 54 68, 64 57" stroke-width="2" stroke-linecap="square"/>
    <text class="label fg" x="164" y="38" text-anchor="middle">OCCHIPINTI</text>
    <text class="title fg" x="164" y="65" text-anchor="middle">GROUP</text>
  </g>

  <g transform="translate(366 72)">
    <rect class="panel" x="0" y="0" width="248" height="116" stroke-width="2"/>
    <path class="soft" d="M124 13 L162 27 L156 57 C153 68 139 76 124 81 C109 76 95 68 92 57 L86 27 Z" stroke-width="1.8"/>
    <path class="line" d="M124 18 V65" stroke-width="1.5"/>
    <path class="line" d="M97 44 H151" stroke-width="1.5"/>
    <path class="line" d="M107 29 V58 M141 29 V58" stroke-width="1"/>
    <text class="small fg" x="124" y="91" text-anchor="middle">UNIVERSITY OF</text>
    <text class="small fg" x="124" y="108" text-anchor="middle">CAMBRIDGE</text>
  </g>

  <g transform="translate(648 82)">
    <rect class="panel" x="0" y="0" width="268" height="96" stroke-width="1.5"/>
    <circle class="soft" cx="224" cy="48" r="27" stroke-width="1.5"/>
    <circle class="line" cx="214" cy="48" r="13" stroke-width="2"/>
    <circle class="line" cx="234" cy="48" r="13" stroke-width="2"/>
    <text class="label fg" x="104" y="38" text-anchor="middle">DI MICHELE</text>
    <text class="title fg" x="104" y="65" text-anchor="middle">LAB</text>
  </g>

  <text class="body muted" x="490" y="216" text-anchor="middle">Supported by</text>
  <g transform="translate(170 226)">
    <rect class="soft" x="0" y="0" width="170" height="28" stroke-width="1.2"/>
    <text class="small fg" x="85" y="19" text-anchor="middle">UKRI</text>
  </g>
  <g transform="translate(405 226)">
    <rect class="soft" x="0" y="0" width="170" height="28" stroke-width="1.2"/>
    <text class="small fg" x="85" y="19" text-anchor="middle">EPSRC</text>
  </g>
  <g transform="translate(640 226)">
    <rect class="soft" x="0" y="0" width="170" height="28" stroke-width="1.2"/>
    <text class="small fg" x="85" y="19" text-anchor="middle">SENSOR CDT</text>
  </g>
</svg>
