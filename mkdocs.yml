site_name: DropLogic
site_description: A Python library for digital microfluidics (DMF) control.
theme:
  name: material
  language: en
  logo: assets/droplets-mark.svg
  favicon: assets/droplets-mark.svg
  font: false
  features:
    - navigation.indexes
  palette:
    scheme: default

extra:
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: Español
      link: /es/
      lang: es

plugins:
  - search
  - mkdocstrings
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting_started.md
      - Example Scripts:
          - Overview: getting_started/examples/index.md
          - Simulator Example: getting_started/examples/simulator.md
          - DMLite Example: getting_started/examples/dmlite.md
  - Architecture Map: repository_structure.md
  - Systems:
      - Overview: systems/index.md
      - Simulator: systems/simulator.md
      - DMLite:
          - Overview: systems/dmlite/index.md
          - Modules:
              - Electrode Matrix: systems/dmlite/electrode_matrix.md
      - Hardware Notes: hardware.md
      - Creating New Systems: creating_systems.md
  - Configuration: configuration.md
  - Planning:
      - Overview: planning/index.md
      - AdvancedDrop:
          - Overview: planning/advanced_drop.md
          - Droplet Management: planning/advanced_drop/droplet_management.md
          - Move: planning/advanced_drop/move.md
          - Split and Extract: planning/advanced_drop/split_and_extract.md
          - Merge: planning/advanced_drop/merge.md
          - Mix: planning/advanced_drop/mix.md
          - Vision and Correction: planning/advanced_drop/vision_and_correction.md
          - Plan Objects: planning/advanced_drop/plan_objects.md
      - Plan Executor: planning/plan_executor.md
  - Visualization:
      - Overview: visualization/index.md
      - Visualizers: visualization/visualizers.md
      - Recording: visualization/recording.md
  - Utilities:
      - Overview: utilities/index.md
      - Hardware Utilities: utilities/hardware_utilities.md
      - Drop Vision: utilities/drop_vision.md
      - Debugging and Diagnostics: utilities/debugging.md

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css
